name: Sync Plugins

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp last_updated + last_sha for each plugin
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.claude-plugin/marketplace.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));

            for (const plugin of data.plugins) {
              const repo = plugin.source.repo;          // e.g. "codyhxyz/statusline"
              const [owner, name] = repo.split('/');

              try {
                const { data: commit } = await github.rest.repos.getCommit({
                  owner,
                  repo: name,
                  ref: 'HEAD',
                });
                plugin.last_updated = commit.commit.committer.date;
                plugin.last_sha = commit.sha;
                core.info(`✓ ${repo} @ ${commit.sha.slice(0, 7)}`);
              } catch (e) {
                core.warning(`✗ ${repo}: ${e.message}`);
              }
            }

            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --staged --quiet || git commit -m "chore: sync plugin timestamps [skip ci]"
          git push
